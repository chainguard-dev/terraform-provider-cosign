name: Tests

on:
  pull_request_target:
    branches:
      - "main"
  push:
    branches:
      - "main"

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - "1.13.*"
          - "1.14.*"

    permissions:
      contents: read
      id-token: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
            api.github.com:443
            cgr.dev:443
            checkpoint-api.hashicorp.com:443
            dl.google.com:443
            fulcio.sigstore.dev:443
            github.com:443
            go.dev:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            tuf-repo-cdn.sigstore.dev:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: "contains(github.event_name, 'pull_request')"
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/merge
          persist-credentials: false

      - name: checkout from push event
        if: github.event_name == 'push'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod
          cache: false
          check-latest: true

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - run: go mod download

      - run: go build -v .

      - run: TF_ACC=1 go test -v -cover ./internal/provider/

  check:
    permissions:
      actions: read
    needs:
      - test
    runs-on: ubuntu-latest
    if: always() # always run as required and if any dependent job is skipped, this is skipped if not always
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
            api.github.com:443
            cgr.dev:443
            checkpoint-api.hashicorp.com:443
            dl.google.com:443
            fulcio.sigstore.dev:443
            github.com:443
            go.dev:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            tuf-repo-cdn.sigstore.dev:443

      - uses: step-security/workflow-conclusion-action@417a08214e364cc913458a2fab8aae827d1ba779 # v3.0.10

      - name: Handle conclusion
        env:
          CONCLUSION: ${{ env.WORKFLOW_CONCLUSION }}
        working-directory: /tmp
        run: |
          if [[ "${CONCLUSION}" == "success" ]]; then
            echo "${CONCLUSION}" && exit 0
          elif [[ "${CONCLUSION}" == "failure" ]]; then
            echo "${CONCLUSION}" && exit 1
          fi
